name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: PHPCS + PHPStan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'
          coverage: none
          tools: composer:v2

      - name: Install composer deps
        run: composer install --prefer-dist --no-progress --no-interaction

      - name: PHPCS
        run: vendor/bin/phpcs --standard=phpcs.xml.dist --warning-severity=0

      - name: PHPStan
        run: composer analyse

  unit:
    name: PHPUnit (unit)
    runs-on: ubuntu-latest
    strategy:
      matrix:
        php: ['8.0', '8.1', '8.2']
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP ${{ matrix.php }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          coverage: xdebug
          tools: composer:v2

      - name: Install composer deps
        run: composer install --prefer-dist --no-progress --no-interaction

      - name: PHPUnit unit
        run: composer test:unit

  integration:
    name: PHPUnit (integration) + WP Plugin Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'
          tools: composer:v2

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install composer deps
        run: composer install --prefer-dist --no-progress --no-interaction

      - name: Install npm deps
        run: npm ci

      - name: Start wp-env
        run: npx wp-env start

      - name: PHPUnit integration (tests-cli)
        run: npx wp-env run tests-cli --env-cwd=wp-content/plugins/elementor-forge ./vendor/bin/phpunit --testsuite=integration

      - name: WP Plugin Check
        run: npx wp-env run cli wp plugin check elementor-forge

  e2e:
    name: Playwright E2E
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'
          tools: composer:v2

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install composer deps
        run: composer install --prefer-dist --no-progress --no-interaction

      - name: Install npm deps
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Start wp-env
        run: npx wp-env start

      - name: Run Playwright
        run: npm run test:e2e

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: tests/E2E/_report/
          retention-days: 7
